# ===================================
# Configuration de l'application
# ===================================
server.port=8081
spring.application.name=mini-projet

# ===================================
# Configuration de la base de donnÈes MySQL
# ===================================
spring.datasource.url=jdbc:mysql://localhost:3306/suiviprojet_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================
# Configuration JPA / Hibernate
# ===================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ===================================
# Configuration JWT
# ===================================
app.jwt.secret=maCleSecreteTresLongueEtSecuriseePourHS512AlgorithmSur256BitsMinimum123456789
app.jwt.expiration=86400000

# ===================================
# Configuration Swagger / OpenAPI
# ===================================
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true

# ===================================
# Logging
# ===================================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ===================================
# DÈsactiver open-in-view (optionnel)
# ===================================
spring.jpa.open-in-view=false

# Upload Configuration
upload.dir=./uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB