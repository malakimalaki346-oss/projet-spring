spring.application.name=mini-projet
server.port=8081

# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/suiviprojet_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=maCleSecreteTresLongueEtSecuriseePourHS512AlgorithmSur256BitsMinimum123456789
app.jwt.expiration=86400000

# SWAGGER
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.disable-swagger-default-url=true
app.document.upload.path=C:/uploads/documents/
